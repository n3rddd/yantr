services:
  tor:
    build:
      context: .
      dockerfile: Dockerfile.tor
    container_name: cashu-me-tor
    labels:
      yantr.app: "cashu-me"
      yantr.service: "Tor Onion Service"
    restart: unless-stopped
    networks:
      - cashu-me
    volumes:
      - tor-keys:/var/lib/tor
    depends_on:
      - web

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cashu-me
    labels:
      yantr.app: "cashu-me"
      yantr.service: "Web UI"
    restart: unless-stopped
    networks:
      - cashu-me
    ports:
      - "3000:80"
    environment:
      - HTTP_PROXY=socks5://tor:9050
      - HTTPS_PROXY=socks5://tor:9050

networks:
  cashu-me:

volumes:
  tor-keys:
