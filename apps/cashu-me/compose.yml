services:
  tor:
    image: docker.io/tor:0.4.8.10
    container_name: cashu-me-tor
    labels:
      yantr.app: "cashu-me"
      yantr.service: "Tor Onion Service"
    restart: unless-stopped
    networks:
      cashu-me:
        ipv4_address: 172.18.0.2
    volumes:
      - tor-keys:/var/lib/tor
      - ./torrc:/etc/tor/torrc:ro

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cashu-me
    labels:
      yantr.app: "cashu-me"
      yantr.service: "Web UI"
    restart: unless-stopped
    networks:
      cashu-me:
        ipv4_address: 172.18.0.3
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "3000:80"

networks:
  cashu-me:
    ipam:
      config:
        - subnet: 172.18.0.0/16

volumes:
  tor-keys:
