services:
  zeroclaw:
    image: ghcr.io/zeroclaw-labs/zeroclaw:latest
    container_name: zeroclaw
    restart: unless-stopped
    environment:
      API_KEY: ${API_KEY:-}
      PROVIDER: ${PROVIDER:-openrouter}
    ports:
      - "3000"
    volumes:
      - zeroclaw_data:/data
    labels:
      yantr.app: "zeroclaw"
      yantr.service: "AI Assistant"

volumes:
  zeroclaw_data:
